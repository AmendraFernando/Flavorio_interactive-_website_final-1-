<!-- Login Section -->
<div class="container login-wrapper">
  <div class="card login-card">

    <div class="login-icon-circle">
      <i class="bi bi-box-arrow-in-right"></i>
    </div>

    <h4 class="text-center fw-bold mb-1">Welcome Back</h4>
    <p class="text-center text-muted mb-4 small">Log in to access your personal recipe collection.</p>

    <form action="index.html" method="get">

      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" placeholder="you@gmail.com" required/>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" placeholder="••••••••" required/>
        </div>
      </div>

      <button type="submit" class="btn btn-dark w-100 py-2">
        <i class="bi bi-box-arrow-in-right me-1"></i> Login
      </button>

    </form>

    <p class="text-center mt-3 mb-0 small">
      Don't have an account? <a href="#" class="text-dark fw-semibold">Sign up</a>
    </p>

  </div>
